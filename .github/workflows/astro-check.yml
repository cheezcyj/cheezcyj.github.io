name: Check Astro foundation

on:
  push:
    branches:
      - redesign/astro-v0
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check types and Astro files
        run: pnpm check

      - name: Check formatting
        run: pnpm format:check

      - name: Verify preserved assets
        run: pnpm verify:assets

      - name: Verify approved project media
        run: pnpm verify:media

      - name: Verify content publication policy
        run: pnpm verify:content

      - name: Build static site
        run: pnpm build
