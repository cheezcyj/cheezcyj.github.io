<!-- Posting Grid Section -->
<section id="posting" class="portfolio-section">
  <div class="container portfolio-flex-grid">
    <div class="row">
      <div class="col-lg-12 text-center">
        <h2>POSTING</h2>
        <hr class="star-primary">
      </div>
    </div>
    <div class="portfolio-flex-row">
      {% for post in site.posts %}
      <div class="portfolio-flex-item portfolio-item">
        <a href="#postingModal-{{ post.modal-id }}" class="portfolio-link" data-toggle="modal">
          <div class="caption"{% if post.posting-title %} data-title="{{ post.posting-title }}"{% endif %}>
            <div class="caption-content">
              <i class="fa fa-search-plus fa-3x"></i>
            </div>
          </div>
          <img src="{{ '/img/portfolio/' | append: post.img | relative_url }}" class="img-responsive" alt="{{ post.alt }}">
        </a>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
